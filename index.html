<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluación por pares</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-cover bg-center bg-no-repeat bg-fixed" style="background-image: url('img/pares.jpg');">

  <main class="max-w-3xl mx-auto px-6 py-10 bg-white/90 rounded-xl shadow-lg my-8">
    <h1 class="text-6xl font-bold text-gray-800 mb-2 text-center">Evaluación por pares</h1>
    <p class="text-gray-600 mb-6 text-center">Asignación automática de revisores</p>

    <div class="flex flex-col items-center gap-2 mb-4">
      <label class="cursor-pointer">
        <input id="checkbox" type="checkbox" class="peer sr-only" />
        <span class="flex h-16 w-16 items-center justify-center rounded-full bg-gray-400 border-2 border-gray-500 peer-checked:bg-cyan-200 peer-checked:shadow-xl peer-checked:shadow-cyan-400/70">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="h-6 w-6 text-blue-600">
            <path fill="currentColor" d="M288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32V256c0 17.7 14.3 32 32 32s32-14.3 32-32V32zM143.5 120.6c13.6-11.3 15.4-31.5 4.1-45.1s-31.5-15.4-45.1-4.1C49.7 115.4 16 181.8 16 256c0 132.5 107.5 240 240 240s240-107.5 240-240c0-74.2-33.8-140.6-86.6-184.6c-13.6-11.3-33.8-9.4-45.1 4.1s-9.4 33.8 4.1 45.1c38.9 32.3 63.5 81 63.5 135.4c0 97.2-78.8 176-176 176s-176-78.8-176-176c0-54.4 24.7-103.1 63.5-135.4z"></path>
          </svg>
        </span>
      </label>
      <p class="text-sm text-gray-600">Generar asignaciones</p>
    </div>

    <p id="mensaje" class="text-center text-sm text-green-700 mb-4"></p>

    <div class="mt-6 bg-white shadow-sm rounded-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-blue-500">
          <tr>
            <th class="px-4 py-2 text-left">Revisor</th>
            <th class="px-4 py-2 text-left">Revisado</th>
            <th class="px-4 py-2 text-left">Repositorio</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
